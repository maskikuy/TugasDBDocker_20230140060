<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>

    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #e0e7ff;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --warning-light: #fef3c7;
            --success: #10b981;
            --success-light: #d1fae5;
            --bg-color: #f3f4f6;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-border: rgba(255, 255, 255, 0.4);
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            --shadow-glow: 0 0 20px rgba(79, 70, 229, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f9fafb;
            background-image:
                radial-gradient(at 40% 20%, hsla(228,100%,74%,0.1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,56%,0.1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355,100%,93%,0.3) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .navbar {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--surface-border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-brand {
            font-size: 1.5rem; font-weight: 700; color: var(--primary);
            display: flex; align-items: center; gap: 10px; letter-spacing: -0.5px;
        }

        .main-content {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
        }

        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 20px; padding: 30px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

        .card-header { margin-bottom: 25px; }

        .card-title {
            font-size: 1.25rem; font-weight: 600; color: var(--text-main);
            display: flex; align-items: center; gap: 10px;
        }

        .card-title-icon {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--primary-light); color: var(--primary);
        }

        .form-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }

        .input-wrapper { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 0.875rem; font-weight: 500; color: var(--text-main); }

        input {
            width: 100%; padding: 12px 16px; border: 1.5px solid var(--border-color);
            border-radius: 12px; font-size: 0.95rem; font-family: inherit;
            transition: all 0.2s ease; background-color: rgba(255, 255, 255, 0.5); outline: none;
        }

        input:focus { border-color: var(--primary); background-color: #ffffff; box-shadow: 0 0 0 4px var(--primary-light); }

        .btn {
            padding: 12px 20px; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: transparent; border: 1.5px solid var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background-color: #f3f4f6; }

        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border-color); background: white; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        th, td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f9fafb; font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        tbody tr:hover { background-color: #f9fafb; }
        .user-name-cell { display: flex; align-items: center; gap: 12px; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), #c7d2fe);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.9rem;
        }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            padding: 14px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: 500;
            display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg);
            background: white; border-left: 4px solid var(--primary);
            animation: slideInRight 0.4s ease forwards;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; height: 20px; width: 100%; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <svg style="width: 28px; height: 28px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        UserFlow
    </div>
</nav>

<main class="main-content">
    <section class="form-section">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <div class="card-title-icon"><svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg></div>
                    Kelola User
                </h2>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <div class="input-wrapper">
                        <label for="name">Nama Lengkap</label>
                        <input type="text" id="name" placeholder="John Doe" required autocomplete="off">
                    </div>
                    <div class="input-wrapper">
                        <label for="nim">NIM</label>
                        <input type="text" id="nim" placeholder="202301400xx" required autocomplete="off">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan Data</button>
                    <button type="button" class="btn btn-secondary" onclick="window.resetForm()">Batal</button>
                </div>
            </form>
        </div>
    </section>

    <section class="table-section">
        <div class="card">
            <div class="card-header"><h2 class="card-title">Daftar User</h2></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Identitas</th><th>NIM</th><th style="width: 150px;">Aksi</th></tr></thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div class="toast-container"></div>

<script>
    $(document).ready(function () {
        const BASE_URL = "/api/user";

        function showToast(message, type) {
            const toastId = 'toast-' + Date.now();
            $(".toast-container").append(`<div id="${toastId}" class="toast ${type}"><span>${type === 'success' ? '✅' : '❌'}</span><span>${message}</span></div>`);
            setTimeout(() => { $(`#${toastId}`).fadeOut(300, function() { $(this).remove(); }); }, 3500);
        }

        function getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase(); }

        function loadUsers() {
            $("#userTable").html('<tr><td colspan="3"><div class="skeleton"></div></td></tr>');
            $.get(BASE_URL, function (users) {
                $("#userTable").empty();
                if(users.length === 0) { $("#userTable").append('<tr><td colspan="3" style="text-align:center; padding:20px; color:#6b7280;">Belum ada data.</td></tr>'); return; }
                users.forEach(user => {
                    $("#userTable").append(`<tr>
                        <td><div class="user-name-cell"><div class="user-avatar">${getInitials(user.name)}</div><span>${user.name}</span></div></td>
                        <td><span style="font-family:monospace;">${user.nim}</span></td>
                        <td>
                            <button onclick="window.editUser('${user.id}', '${user.name}', '${user.nim}')" style="background:none; border:none; color:var(--warning-hover); cursor:pointer; margin-right:10px; font-weight:600;">Edit</button>
                            <button onclick="window.deleteUser('${user.id}')" style="background:none; border:none; color:var(--danger-hover); cursor:pointer; font-weight:600;">Hapus</button>
                        </td>
                    </tr>`);
                });
            }).fail(() => { $("#userTable").html('<tr><td colspan="3" style="text-align:center; color:var(--danger); padding:20px;">Gagal memuat data.</td></tr>'); });
        }

        $("#userForm").submit(function (e) {
            e.preventDefault();
            const id = $("#userId").val();
            const userData = { name: $("#name").val(), nim: $("#nim").val() };
            const isUpdate = !!id;
            $("#btnSubmit").prop("disabled", true).text("Processing...");

            $.ajax({
                url: isUpdate ? BASE_URL + "/" + id : BASE_URL,
                type: isUpdate ? "PUT" : "POST",
                contentType: "application/json",
                data: JSON.stringify(userData),
                success: function () { showToast("Berhasil disimpan", "success"); window.resetForm(); loadUsers(); },
                error: function () { showToast("Gagal menyimpan", "error"); },
                complete: function() { $("#btnSubmit").prop("disabled", false).text("Simpan Data"); }
            });
        });

        window.editUser = (id, name, nim) => { $("#userId").val(id); $("#name").val(name); $("#nim").val(nim); $("#btnSubmit").text("Update Data"); window.scrollTo({top:0, behavior:'smooth'}); };
        window.deleteUser = (id) => { if(confirm("Hapus user?")) $.ajax({ url: BASE_URL + "/" + id, type: "DELETE", success: () => { showToast("Terhapus", "success"); loadUsers(); } }); };
        window.resetForm = () => { $("#userId").val(""); $("#name").val(""); $("#nim").val(""); $("#btnSubmit").text("Simpan Data"); };
        loadUsers();
    });
</script>
</body>
</html>
